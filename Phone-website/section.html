<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Shop</title>
    <link rel="stylesheet" href="section.css">
    <script src="https://kit.fontawesome.com/8c2cef5ade.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- TOP HEADER -->
    <header class="top-header">
        <div class="logo">
            <i class="fa-solid fa-bolt"></i>
            <span>Sections</span>
        </div>
        <i class="fa-solid fa-cart-shopping cart-icon"></i>
    </header>
    
    <!-- SEARCH -->
    <div class="search-section">
        <input type="text" placeholder="Search about your need">
        <i class="fa-solid fa-magnifying-glass"></i>
    </div>


    <section class="sections-section">
        <div class="stacks">

            <div class="items">
                <img src="iphone 2.jpeg">
                <h4>iphone</h4>
                <p>50 items</p>
            </div>

            <div class="items">
                <img src="laptop.jpeg">
                <h4>Laptops</h4>
                <p>18 items</p>
            </div>

            <div class="items">
                <img src="accessories.jpeg">
                <h4>Accessories</h4>
                <p>30 items</p>
            </div>

            <div class="items">
                <img src="camera.jpeg">
                <h4>Camera</h4>
                <p>100 items</p>
            </div>

            <div class="items">
                <img src="headphone.jpeg">
                <h4>Headphone</h4>
                <p>68 items</p>
            </div>

            <div class="items">
                <img src="computer.jpeg">
                <h4>Computer</h4>
                <p>28 items</p>
            </div>

            <div class="items">
                <img src="television.jpeg">
                <h4>Television</h4>
                <p>23 items</p>
            </div>

            <div class="items">
                <img src="tablet.jpeg">
                <h4>Tablet</h4>
                <p>50 items</p>
            </div>

            <div class="items">
                <img src="keyboard.jpeg">
                <h4>Keyboard</h4>
                <p>80 items</p>
            </div>
            

        </div>
    </section>

    


    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="order.html" class="nav-item">
            <i class="fas fa-box"></i>
            <span>Orders</span>
        </a>
        <a href="section.html" class="nav-item active">
            <i class="fas fa-th"></i>
            <span>Sections</span>
        </a>
        <a href="favorite.html" class="nav-item">
            <i class="fas fa-heart"></i>
            <span>Favorite</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    
</body>
</html>
