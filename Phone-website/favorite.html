<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Shop</title>
    <link rel="stylesheet" href="favorite.css" >

    <script src="https://kit.fontawesome.com/8c2cef5ade.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- TOP HEADER -->
    <header class="top-header">
        <div class="logo">
            <i class="fa-solid fa-bolt"></i>
            <span>My Favorites</span>
        </div>
        <i class="fa-solid fa-cart-shopping cart-icon"></i>
    </header>

    <!-- FAVORITES CONTENT -->
<section class="favorites-section">
    <div class="favorites-grid">

        <!-- Empty state message -->
        <div class="empty-state">
            <i class="fas fa-heart-broken"></i>
            <p>No favorites yet</p>
            <span>Tap ❤️ on any item to save it here</span>
        </div>

    </div>
</section>




    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="order.html" class="nav-item">
            <i class="fas fa-box"></i>
            <span>Orders</span>
        </a>
        <a href="section.html" class="nav-item">
            <i class="fas fa-th"></i>
            <span>Sections</span>
        </a>
        <a href="favorite.html" class="nav-item active">
            <i class="fas fa-heart"></i>
            <span>Favorite</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    
</body>
</html>
