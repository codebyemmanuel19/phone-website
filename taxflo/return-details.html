<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="return-details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- RETURN-DETAILS-ICON -->
    <div class="return-details">
        <a href="returns.html">
          <i class="fa-solid fa-chevron-left"></i>
        </a>
           <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <!--RETURN-DETAILS-ICON-SUBMITTED-->
    <div class="return-details-submitted">
        <div class="submit">
            <h2>ITR112-2024</h2>
            <span class="babge-data-submitted">Submitted</span>
        </div>
        <p class="submit-date">Submitted on 23 may 2026</p>
    </div>

    <!-- PROGRESS TRACKER -->
<div class="progress-tracker">

    <div class="progress-step active">
        <div class="step-circle active">
            <i class="fa-solid fa-check"></i>
        </div>
        <p>Submitted</p>
    </div>

    <div class="progress-line active"></div>

    <div class="progress-step">
        <div class="step-circle">
            <i class="fa-regular fa-file"></i>
        </div>
        <p>In Review</p>
    </div>

    <div class="progress-line"></div>

    <div class="progress-step">
        <div class="step-circle">
            <i class="fa-regular fa-file-lines"></i>
        </div>
        <p>Assessed</p>
    </div>

    <div class="progress-line"></div>

    <div class="progress-step">
        <div class="step-circle">
            <i class="fa-regular fa-circle-check"></i>
        </div>
        <p>Completed</p>
    </div>

</div>


   <!-- RETURN SUMMARY -->
    <div class="return-sommary">
        <h2>Return Summary</h2>

        <div class="sommary-datails">
            <h4>Total Income</h4>
            <p>R 580,000.00</p>
        </div>

        <div class="sommary-datails">
            <h4>Total Deductions</h4>
            <p>R 120,000.00</p>
        </div>

        <div class="sommary-datails">
            <h4>Taxable Income</h4>
            <p>R 460,000.00</p>
        </div>

        <div class="sommary-datails">
            <h4>Tax Amount</h4>
            <p>R 45,231.00</p>
        </div>

        <div class="amount-payable">
            <h2>Amount Payable</h2>
            <p>R 45,231.00</p>
        </div>
    </div>

    <div class="return-button">
        <button class="download">Download Receipt</button>

        <button class="view ">View Details</button>
    </div>

</body>
</html>
