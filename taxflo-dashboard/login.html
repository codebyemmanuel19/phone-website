<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxFlo</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>


<!-- CARD -->
<div class="card">

    <!-- LOGO SECTION -->
    <div class="logo">
        <div class="logo-sars">
            <img src="logo.png">
            <h1>TaxFlo</h1>
        </div>
        <h2>Welcome Back</h2>
        <p>Sign in to continue</p>
    </div>

    <!-- LOGIN FORM -->
    <div class="login">

        <div class="input-group">
            <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </span>
            <input type="text" placeholder="Email or Username">
        </div>

        <div class="input-group">
            <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </span>
            <input type="password" placeholder="Password" id="passwordInput">
            <span class="eye-icon" onclick="togglePassword()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </span>
        </div>


        <div class="remember-row">
            <label>
                <input type="checkbox" checked>
                Remember me
            </label>
            <a href="#">Forgot Password?</a>
        </div>

        <button class="btn-signin">Sign In</button>
        <p><p class="demo-hint"> Press Sign In to continue  no credentials needed</p></p>

        <div class="or-divider"><span>OR</span></div>

        <button class="btn-biometric">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a10 10 0 0 1 10 10"/>
                <path d="M12 6a6 6 0 0 1 6 6"/>
                <path d="M12 10a2 2 0 0 1 2 2"/>
                <path d="M2 12A10 10 0 0 0 12 22"/>
                <path d="M6 12a6 6 0 0 0 6 6"/>
            </svg>
            Sign in with Biometric
        </button>

        <p class="footer-text">Don't have an account? <a href="#">Contact Admin</a></p>

    </div>
</div>

<script src="login.js"></script>
</body>
</html>
