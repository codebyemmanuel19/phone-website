<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="taxpayer-details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- ICON SECTION -->
    <div class="icon-section">
        <a href="taxpayers.html">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <!-- PROFILE -->
     <div class="profile">

        <div class="jd-profile">
            <h2>JD</h2>
        </div>

        <span class="prifile-active">Active</span>
        <h2>John Doe</h2>
        <p>ITN1234567890</p>
     </div>
    
     <!--TABS -->
     <div class="details-tabs">
        <p class="tab active-tab">Overview</p>
        <p class="tab">Returd (8)</p>
        <p class="tab">Documrnts (5)</p>
     </div>
 
     <!-- INFORMATION -->
     <div class="information">
            <h2>Contact information</h2>

            <div class="info-row">
                <div class="info-left">
                    <i class="fa-regular fa-envelope"></i>
                    <p>Email</p>
                </div>
                <p class="info-right">infor@ptytd.com.za</p>
            </div>

            <div class="info-row">

                <div class="info-left">
                    <i class="fa-solid fa-phone"></i>
                    <p>Phone</p>
                </div>
                <p class="info-right">011 234 5678</p>
            </div>

            <div class="info-row">
                <div class="info-left">
                    <i class="fa-solid fa-location-dot"></i>
                    <p>Address</p>
                </div>
                <p class="info-right">123 Main Street Pretoria, 0001</p>
            </div>
     </div>

     <!-- TAX INFORMATION-->
     <div class="tax-information">
        <h2>Tax information</h2>

        <div class="tax-row">
        <div class="tax-left">
            <i class="fa-solid fa-briefcase"></i>
            <p>Tax Type</p>
        </div>

        <p class="tax-right">individual</p>
        </div>

        <div class="tax-row">
        <div class="tax-left">
            <i class="fa-regular fa-folder"></i>
            <p>Registration Date</p>
        </div>

        <p class="tax-right">12 may 2026</p>
        </div>

        <div class="tax-row">
        <div class="tax-left">
            <i class="fa-solid fa-chart-line"></i>
            <p>Status</p>
        </div>

        <p class="tax-right">Compliant</p>
        </div>
     </div>
     
</body>
</html>
